name: CI — test, build & publish Docker images

# Run tests on every push and PR; publish images only on main push.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs; only the latest push to main matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/fitness-tracker

jobs:
  lint:
    name: Lint (ruff + eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Lint backend
        run: |
          cd backend
          pip install ruff
          python -m ruff check .

      - name: Validate migrations
        run: |
          cd backend
          python scripts/validate_migrations.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Verify migrations apply cleanly
        run: |
          cd backend
          rm -f /tmp/ci_test.db
          DATABASE_URL=sqlite:////tmp/ci_test.db alembic upgrade head
          DATABASE_URL=sqlite:////tmp/ci_test.db alembic downgrade -1
          DATABASE_URL=sqlite:////tmp/ci_test.db alembic upgrade head  # re-apply to confirm round-trip

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --cov=app --cov-report=term-missing --tb=short --cov-fail-under=82

  frontend-tests:
    name: Frontend type-check & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      # `tsc --noEmit` at the repo root is a no-op: the root tsconfig has
      # `files: []` and only project references, so it checks nothing. Build
      # the referenced projects (`tsc -b`, both are noEmit) to actually
      # type-check src/ — this is the same type gate `npm run build` runs.
      - name: Type-check (tsc)
        run: |
          cd frontend
          npx tsc -b

      - name: Unit tests (Vitest)
        run: |
          cd frontend
          npx vitest run

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend deps
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd frontend
          npm run test:e2e

      # Traces (on-first-retry) are the only way to debug CI-only failures.
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  publish:
    name: Build & push Docker images
    needs: [lint, test, frontend-tests, e2e]
    # Tests run on PRs, but images are published only from pushes to main
    # (and manual dispatches) — never from unreviewed PR code.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so the daily revision counter can count today's commits.
          fetch-depth: 0

      - name: Compute app version
        id: version
        run: |
          DATE=$(date -u +'%Y.%m.%d')
          # Daily revision = number of commits landed today (UTC).
          REV=$(git log --since="$(date -u +'%Y-%m-%d')T00:00:00Z" --oneline | wc -l | tr -d ' ')
          [ "$REV" -gt 0 ] || REV=1
          echo "version=${DATE}.${REV}" >> "$GITHUB_OUTPUT"
          echo "App version: ${DATE}.${REV}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          # Lowercase the owner (GHCR requires lowercase repo names).
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          # Bake the version into the frontend bundle; backend ignores it.
          build-args: |
            ${{ matrix.name == 'frontend' && format('APP_VERSION={0}', steps.version.outputs.version) || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: [publish]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://fit.nergy.space
    steps:
      - name: Get Known Hosts
        run: echo "KNOWN_HOSTS=$(ssh-keyscan -H ${{ secrets.SSH_HOST }})" >> $GITHUB_ENV

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: github-actions
          known_hosts: ${{ env.KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Pull and start on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/code/fitness-tracker
            docker compose pull
            docker compose up -d
