server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    # Proxy API calls to the backend over the internal Docker network, so the
    # browser only ever talks to this origin (no CORS, no baked API host).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes, but real files
    # (assets, sw.js, manifest, images) are served directly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The service worker must never be cached, so updates roll out promptly.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
