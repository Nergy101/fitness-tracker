server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for client-side routes, but real files
    # (assets, sw.js, manifest, images) are served directly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The service worker must never be cached, so updates roll out promptly.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
