server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ────────────────────────────────────────────────
    # Applied at the server level so they inherit into `location /` (the SPA
    # HTML) and `location /api/`. `always` emits them on error responses too.
    # The app handles personal health data, so it must not be framable or
    # MIME-sniffable, and the CSP blunts XSS (the auth token lives in
    # localStorage). 'unsafe-inline' in style-src is required for React inline
    # `style={{…}}` attributes (e.g. iOS safe-area padding); scripts stay
    # locked to same-origin (Vite emits external bundles, no inline scripts).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; media-src 'self' blob: data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;

    # Proxy API calls to the backend over the internal Docker network, so the
    # browser only ever talks to this origin (no CORS, no baked API host).
    location /api/ {
        # Apple Health backfill can be tens–hundreds of MB in one POST; default 1M 413s.
        client_max_body_size 128M;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite (not append) so the value is a single trusted entry: the
        # real connecting client. The backend rate limiter keys on this, so an
        # attacker cannot prepend a spoofed X-Forwarded-For to dodge lockout.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes, but real files
    # (assets, sw.js, manifest, images) are served directly. The app shell
    # must not be cached — a stale index.html references hashed bundles that
    # no longer exist after a deploy, blanking the app until a hard reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; media-src 'self' blob: data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
    }

    # The service worker must never be cached, so updates roll out promptly.
    # nginx drops inherited add_headers when a location sets its own, so the
    # security headers are repeated here to keep them on the sw.js response.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
