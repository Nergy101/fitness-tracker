# Runs the pushed :latest images. Just `docker compose up` and open
# http://localhost:8080 — the frontend proxies /api to the backend over the
# internal network, so nothing else needs configuring.
#
#   docker compose up            # run it
#   docker compose build         # build the images locally
#   docker compose push          # push them (after: docker login ghcr.io)
services:
  backend:
    image: ghcr.io/nergy101/fitness-tracker-backend:latest
    build: ./backend
    # No published port: only the frontend reaches it, over the internal network.
    expose:
      - "8000"
    # Optional: pin the login password so it stays stable across deploys.
    # If unset, settings.toml in ./data keeps its generated password.
    environment:
      - FITNESS_PASSWORD=${FITNESS_PASSWORD:-}
    volumes:
      # /data is a literal FS bind mount so SQLite + settings.toml + backup_config.json
      # live in ./data next to the compose file (survives container recreation).
      - ./data:/data
      - ./backups:/backups
    networks:
      - app
    restart: unless-stopped

  frontend:
    image: ghcr.io/nergy101/fitness-tracker-frontend:latest
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app
    restart: unless-stopped

networks:
  app:
